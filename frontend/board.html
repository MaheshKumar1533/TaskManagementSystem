<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskSphere - Task Board</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Modular Style -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-icon">
                    <i class="fa-solid fa-cubes-stacked"></i>
                </div>
                <h2>TaskSphere</h2>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-item">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="board.html" class="nav-item active">
                    <i class="fa-solid fa-table-columns"></i>
                    <span>Task Board</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <span class="status-pill connected">
                    <span class="dot"></span> Connected
                </span>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <span class="date-badge" id="current-date">July 21, 2026</span>
                    <h1>Task Board</h1>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" id="btn-new-task">
                        <i class="fa-solid fa-plus"></i> New Task
                    </button>
                </div>
            </header>

            <!-- Kanban Board View -->
            <section class="view-section" id="board-view">
                <div class="board-filters">
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="search-input" placeholder="Search tasks...">
                    </div>
                    <div class="filter-options">
                        <select id="priority-filter">
                            <option value="">All Priorities</option>
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                </div>

                <div class="kanban-board">
                    <!-- To Do Column -->
                    <div class="kanban-col" id="col-todo">
                        <div class="col-header border-todo">
                            <div class="header-title">
                                <span class="indicator todo"></span>
                                <h3>To Do</h3>
                            </div>
                            <span class="col-count badge-todo" id="todo-badge">0</span>
                        </div>
                        <div class="task-list" id="list-todo">
                            <!-- Dynamically loaded task cards -->
                        </div>
                    </div>

                    <!-- In Progress Column -->
                    <div class="kanban-col" id="col-progress">
                        <div class="col-header border-progress">
                            <div class="header-title">
                                <span class="indicator progress"></span>
                                <h3>In Progress</h3>
                            </div>
                            <span class="col-count badge-progress" id="progress-badge">0</span>
                        </div>
                        <div class="task-list" id="list-progress">
                            <!-- Dynamically loaded task cards -->
                        </div>
                    </div>

                    <!-- Done Column -->
                    <div class="kanban-col" id="col-done">
                        <div class="col-header border-done">
                            <div class="header-title">
                                <span class="indicator done"></span>
                                <h3>Done</h3>
                            </div>
                            <span class="col-count badge-done" id="done-badge">0</span>
                        </div>
                        <div class="task-list" id="list-done">
                            <!-- Dynamically loaded task cards -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Task Create/Edit Modal -->
    <div class="modal-overlay hidden" id="task-modal">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modal-title">Create New Task</h2>
                <button class="btn-close" id="btn-close-modal">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                
                <div class="form-group">
                    <label for="task-title">Title *</label>
                    <input type="text" id="task-title" placeholder="What needs to be done?" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="task-desc">Description</label>
                    <textarea id="task-desc" rows="3" placeholder="Provide some context..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="task-status">Status</label>
                        <select id="task-status">
                            <option value="todo">To Do</option>
                            <option value="in_progress">In Progress</option>
                            <option value="done">Done</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="task-priority">Priority</label>
                        <select id="task-priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="task-due">Due Date</label>
                    <input type="date" id="task-due">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="btn-cancel-task">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="btn-save-task">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom Toast Notifications Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Javascript Stack -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/board.js"></script>
</body>
</html>
